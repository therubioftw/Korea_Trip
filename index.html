<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b3d91">
<title>חישובי כספים לקוריאה</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --blue:#0b3d91; --blue2:#1556d6; --red:#c0392b; --green:#1e8e4f;
    --bg:#f4f6fb; --card:#ffffff; --ink:#16213e; --muted:#6b7488; --line:#e6e9f2;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans Hebrew",sans-serif;
    background:var(--bg); color:var(--ink);
    padding:0 0 96px; min-height:100vh;
  }
  header{
    background:linear-gradient(135deg,var(--blue),var(--blue2));
    color:#fff; padding:calc(env(safe-area-inset-top) + 16px) 18px 16px;
    position:sticky; top:0; z-index:10;
    box-shadow:0 2px 10px rgba(11,61,145,.25);
  }
  header h1{margin:0; font-size:20px; font-weight:700; display:flex; align-items:center; gap:8px}
  header .sub{margin-top:4px; font-size:12px; opacity:.85; display:flex; gap:10px; align-items:center}
  .dot{width:8px;height:8px;border-radius:50%;background:#9fb6ff;display:inline-block}
  .dot.live{background:#5cffb1}
  .dot.err{background:#ff8a8a}
  .wrap{max-width:560px; margin:0 auto; padding:16px}

  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:14px; box-shadow:0 1px 3px rgba(20,33,62,.05)}
  .card h2{margin:0 0 12px; font-size:15px; color:var(--muted); font-weight:600}

  .total{display:flex; align-items:baseline; justify-content:space-between}
  .total .v{font-size:26px; font-weight:800; color:var(--blue)}

  .person{display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-top:1px solid var(--line)}
  .person:first-of-type{border-top:none}
  .person .name{font-weight:700; font-size:16px}
  .person .meta{font-size:12px; color:var(--muted); margin-top:2px}
  .badge{font-weight:800; font-size:15px; padding:6px 10px; border-radius:10px; white-space:nowrap}
  .owes{background:rgba(192,57,43,.1); color:var(--red)}
  .gets{background:rgba(30,142,79,.1); color:var(--green)}
  .settled{background:#eef0f5; color:var(--muted)}

  label{display:block; font-size:13px; color:var(--muted); margin:10px 0 6px}
  select,input,textarea{
    width:100%; font-size:16px; padding:13px 14px; border:1.5px solid var(--line);
    border-radius:12px; background:#fff; color:var(--ink); font-family:inherit;
  }
  select:focus,input:focus,textarea:focus{outline:none; border-color:var(--blue2)}
  .row2{display:grid; grid-template-columns:1fr 110px; gap:10px}
  .seg{display:flex; gap:8px; margin-top:6px}
  .seg button{flex:1; padding:12px; border:1.5px solid var(--line); background:#fff; border-radius:12px; font-size:16px; font-weight:700; color:var(--ink)}
  .seg button.on{background:var(--blue); color:#fff; border-color:var(--blue)}

  .btn{width:100%; margin-top:16px; padding:15px; border:none; border-radius:14px; background:var(--blue); color:#fff; font-size:17px; font-weight:800}
  .btn:disabled{opacity:.5}
  .btn.secondary{background:#eef0f5; color:var(--ink)}

  .exp{display:flex; align-items:center; justify-content:space-between; padding:11px 0; border-top:1px solid var(--line); gap:10px}
  .exp:first-of-type{border-top:none}
  .exp .who{font-weight:700}
  .exp .what{font-size:13px; color:var(--muted)}
  .exp .amt{font-weight:700; white-space:nowrap}
  .exp .amt small{display:block; font-weight:500; color:var(--muted); text-align:left}

  .empty{color:var(--muted); text-align:center; padding:18px 0; font-size:14px}
  .toast{position:fixed; left:50%; bottom:110px; transform:translateX(-50%); background:#16213e; color:#fff; padding:12px 18px; border-radius:12px; font-size:14px; opacity:0; transition:opacity .25s; z-index:50; max-width:90%; text-align:center}
  .toast.show{opacity:1}
  .toast.bad{background:var(--red)}

  .tabbar{position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--line); display:flex; padding:8px 8px calc(env(safe-area-inset-bottom) + 8px); z-index:20}
  .tabbar button{flex:1; background:none; border:none; padding:8px; font-size:12px; color:var(--muted); font-weight:600; display:flex; flex-direction:column; align-items:center; gap:3px}
  .tabbar button.on{color:var(--blue)}
  .tabbar .ic{font-size:20px}

  .hidden{display:none}
  .link{color:var(--blue2); text-decoration:underline; cursor:pointer}
  .small{font-size:12px; color:var(--muted)}
  .center{text-align:center}
</style>
</head>
<body>
<header>
  <h1>🇰🇷 חישובי כספים לקוריאה</h1>
  <div class="sub"><span id="statusDot" class="dot"></span><span id="statusText">מתחבר…</span></div>
</header>

<div class="wrap">

  <!-- ===== VIEW: SUMMARY ===== -->
  <section id="viewSummary">
    <div class="card">
      <div class="total"><span>סה״כ הוצאות הטיול</span><span class="v" id="tripTotal">—</span></div>
    </div>
    <div class="card">
      <h2>מי חייב למי</h2>
      <div id="people"><div class="empty">טוען…</div></div>
    </div>
    <button class="btn secondary" id="refreshBtn">רענן עכשיו</button>
  </section>

  <!-- ===== VIEW: ADD ===== -->
  <section id="viewAdd" class="hidden">
    <div class="card">
      <h2>הוספת הוצאה</h2>
      <label>מתי?</label>
      <input id="when" type="date">

      <label>מי שילם?</label>
      <select id="who"></select>

      <label>על מה?</label>
      <input id="what" type="text" inputmode="text" placeholder="לדוגמה: ארוחת ערב, מונית, כניסה למוזיאון">

      <label>כמה?</label>
      <input id="amount" type="number" inputmode="decimal" min="0" step="any" placeholder="0">

      <label>מטבע</label>
      <div class="seg" id="curSeg">
        <button type="button" data-cur="₩" class="on">₩</button>
        <button type="button" data-cur="$">$</button>
        <button type="button" data-cur="₪">₪</button>
      </div>

      <button class="btn" id="addBtn">הוסף הוצאה</button>
    </div>

    <div class="card">
      <h2>הוצאות אחרונות</h2>
      <div id="recent"><div class="empty">אין עדיין הוצאות</div></div>
    </div>
  </section>

  <!-- ===== VIEW: SETTINGS ===== -->
  <section id="viewSettings" class="hidden">
    <div class="card">
      <h2>הגדרות</h2>
      <label>כתובת ה‑Web App (מ‑Google Apps Script)</label>
      <input id="apiUrl" type="url" placeholder="https://script.google.com/macros/s/.../exec">
      <button class="btn" id="saveUrlBtn">שמור וחבר</button>
      <p class="small" style="margin-top:14px">
        הדבק כאן את הקישור שקיבלת בעת פרסום ה‑Web App. הקישור נשמר במכשיר הזה בלבד.
      </p>
      <button class="btn secondary" id="reloadBtn">טען מחדש את הנתונים</button>
    </div>
    <p class="small center">חישובי כספים לקוריאה · גרסה 1.0</p>
  </section>

</div>

<div class="tabbar">
  <button data-view="viewSummary" class="on"><span class="ic">📊</span>סיכום</button>
  <button data-view="viewAdd"><span class="ic">➕</span>הוספה</button>
  <button data-view="viewSettings"><span class="ic">⚙️</span>הגדרות</button>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   CONFIG — paste your deployed Web App URL between the quotes,
   OR leave it empty and set it in-app under ⚙️ הגדרות.
   ============================================================ */
var DEFAULT_API_URL = "https://script.google.com/macros/s/AKfycbyLTfnq849buWBtzewLa-PzRweGcYv64v8MDpdMLxEElkPAFTVzh4Etprc1VI85aQ/exec";

var API_URL = localStorage.getItem('apiUrl') || DEFAULT_API_URL;
var POLL_MS = 5000;
var selectedCur = "₩";
var pollTimer = null;
var lastData = null;

/* ---------- helpers ---------- */
function $(id){ return document.getElementById(id); }
function todayStr(){
  var d=new Date(), p=function(n){return (n<10?'0':'')+n;};
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());
}
function fmtNIS(n){
  if(n===null||n===undefined||isNaN(n)) return '—';
  return '₪' + Math.abs(n).toLocaleString('he-IL',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function toast(msg,bad){
  var t=$('toast'); t.textContent=msg; t.className='toast show'+(bad?' bad':'');
  setTimeout(function(){ t.className='toast'+(bad?' bad':''); },2600);
}
function setStatus(state){
  var dot=$('statusDot'), txt=$('statusText');
  dot.className='dot '+(state==='live'?'live':state==='err'?'err':'');
  txt.textContent = state==='live'?'מסונכרן': state==='err'?'אין חיבור': 'מתחבר…';
}

/* ---------- tabs ---------- */
document.querySelectorAll('.tabbar button').forEach(function(b){
  b.onclick=function(){
    document.querySelectorAll('.tabbar button').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');
    ['viewSummary','viewAdd','viewSettings'].forEach(function(v){ $(v).classList.add('hidden'); });
    $(b.dataset.view).classList.remove('hidden');
  };
});

/* ---------- currency segment ---------- */
document.querySelectorAll('#curSeg button').forEach(function(b){
  b.onclick=function(){
    document.querySelectorAll('#curSeg button').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on'); selectedCur=b.dataset.cur;
  };
});

/* ---------- networking ---------- */
function loadData(){
  if(!API_URL){ setStatus('err'); showNeedsSetup(); return; }
  fetch(API_URL, {method:'GET'})
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(!d || d.ok===false){ throw new Error(d && d.error || 'bad response'); }
      lastData=d; setStatus('live'); render(d);
    })
    .catch(function(e){ setStatus('err'); });
}

function addExpense(){
  if(!API_URL){ toast('קודם הגדר כתובת Web App ב⚙️',true); return; }
  var who=$('who').value;
  var amount=parseFloat($('amount').value);
  var what=$('what').value.trim();
  var when=$('when').value || todayStr();   // YYYY-MM-DD
  if(!who){ toast('בחר מי שילם',true); return; }
  if(!(amount>0)){ toast('הכנס סכום תקין',true); return; }

  var btn=$('addBtn'); btn.disabled=true; btn.textContent='מוסיף…';
  fetch(API_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'}, // text/plain avoids CORS preflight
    body:JSON.stringify({action:'add', date:when, who:who, what:what, amount:amount, currency:selectedCur})
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if(!d || d.ok===false){ throw new Error(d && d.error || 'bad response'); }
    lastData=d; render(d); setStatus('live');
    $('amount').value=''; $('what').value=''; $('when').value=todayStr();
    toast('נוסף ✓');
  })
  .catch(function(e){ toast('שגיאה בשמירה — נסה שוב',true); })
  .finally(function(){ btn.disabled=false; btn.textContent='הוסף הוצאה'; });
}

/* ---------- rendering ---------- */
function render(d){
  $('tripTotal').textContent = d.totalText || fmtNIS(d.total);

  // payer dropdown
  var sel=$('who'); var cur=sel.value;
  if(d.payers && d.payers.length){
    sel.innerHTML='';
    d.payers.forEach(function(p){
      var o=document.createElement('option'); o.value=p; o.textContent=p; sel.appendChild(o);
    });
    if(cur) sel.value=cur;
  }

  // people / settlement
  var box=$('people');
  if(!d.summary || !d.summary.length){ box.innerHTML='<div class="empty">אין נתונים</div>'; }
  else{
    box.innerHTML='';
    d.summary.forEach(function(s){
      var rem = s.remaining;
      var cls='settled', label='מאוזן';
      if(rem!==null && rem>0.5){ cls='owes'; label='צריך לשלם ' + fmtNIS(rem); }
      else if(rem!==null && rem<-0.5){ cls='gets'; label='מקבל בחזרה ' + fmtNIS(rem); }
      var row=document.createElement('div'); row.className='person';
      row.innerHTML =
        '<div><div class="name">'+esc(s.name)+'</div>'+
        '<div class="meta">שילם '+ (s.paidText||fmtNIS(s.paid)) +' · חלקו '+ (s.shareText||fmtNIS(s.share)) +'</div></div>'+
        '<div class="badge '+cls+'">'+label+'</div>';
      box.appendChild(row);
    });
  }

  // recent expenses
  var rec=$('recent');
  if(!d.expenses || !d.expenses.length){ rec.innerHTML='<div class="empty">אין עדיין הוצאות</div>'; }
  else{
    rec.innerHTML='';
    d.expenses.slice().reverse().forEach(function(x){
      var el=document.createElement('div'); el.className='exp';
      el.innerHTML =
        '<div><div class="who">'+esc(x.who)+'</div>'+
        '<div class="what">'+esc(x.what||'')+ (x.date?' · '+esc(x.date):'') +'</div></div>'+
        '<div class="amt">'+ (x.nisText||fmtNIS(x.nis)) +
          '<small>'+ formatRaw(x.amount,x.currency) +'</small></div>';
      rec.appendChild(el);
    });
  }
}
function formatRaw(a,c){
  if(a===null||a===undefined||a==='') return '';
  var n = Number(a);
  if(isNaN(n)) return '';
  return (c||'') + n.toLocaleString('he-IL');
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];}); }

function showNeedsSetup(){
  $('people').innerHTML='<div class="empty">עדיין לא מחובר.<br>עבור ל⚙️ <b>הגדרות</b> והדבק את כתובת ה‑Web App.</div>';
}

/* ---------- settings ---------- */
$('saveUrlBtn').onclick=function(){
  var v=$('apiUrl').value.trim();
  if(!/^https:\/\/script\.google\.com\/macros\/s\/.+\/exec/.test(v)){
    toast('הכתובת צריכה להיגמר ב‑/exec',true); return;
  }
  localStorage.setItem('apiUrl', v); API_URL=v;
  toast('נשמר ✓'); setStatus('…'); loadData(); startPolling();
};
$('reloadBtn').onclick=loadData;
$('refreshBtn').onclick=loadData;
$('addBtn').onclick=addExpense;

/* ---------- polling ---------- */
function startPolling(){
  if(pollTimer) clearInterval(pollTimer);
  pollTimer=setInterval(function(){ if(document.visibilityState==='visible') loadData(); }, POLL_MS);
}
document.addEventListener('visibilitychange',function(){ if(document.visibilityState==='visible') loadData(); });

/* ---------- boot ---------- */
$('when').value=todayStr();
if(API_URL){ $('apiUrl').value=API_URL; }
loadData();
startPolling();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}
</script>
</body>
</html>
